<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App</title>
    <script>
      // Octoput is dark-only. Apply the dark class immediately so there's no
      // light flash before the stylesheet/React mount.
      document.documentElement.classList.add("dark");
    </script>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        /* Transparent so the native macOS vibrancy material shows through. */
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Preload is injected by the native layer via webPreferences.preload -->
    <script type="module" src="./main/index.tsx"></script>
  </body>
</html>
